<!DOCTYPE html>
<html>
<head>
    <title>Add Book</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 15px; width: 400px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 25px; outline: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>➕ Add New Book</h2>
        <form id="addForm">
            <input type="text" id="title" placeholder="Book Title" required>
            <input type="text" id="author" placeholder="Author Name" required>
            <input type="text" id="isbn" placeholder="ISBN Number" required>
            <input type="text" id="imageUrl" placeholder="Paste Image URL here" required>
            <button type="submit">Save Book</button>
        </form>
        <br><a href="dashboard.html" style="color: #3498db; text-decoration: none;">⬅ Back to Dashboard</a>
    </div>

    <script>
        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Prepare data with correct property names
            const bookData = {
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                isbn: document.getElementById('isbn').value,
                imageUrl: document.getElementById('imageUrl').value
            };

            const response = await fetch('http://localhost:5000/api/books/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bookData)
            });

            if (response.ok) {
                alert("✅ Success: Book Added to Library!");
                window.location.href = "dashboard.html";
            } else {
                const err = await response.json();
                alert("❌ Error: " + err.message);
            }
        });
    </script>
</body>
</html>
