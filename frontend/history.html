<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartLibrary | My History</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Poppins', sans-serif; box-sizing: border-box; }
        body { 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-attachment: fixed; margin: 0; color: white; min-height: 100vh;
        }
        .container { max-width: 800px; margin: 50px auto; padding: 20px; }
        .back-btn { color: #3498db; text-decoration: none; font-weight: 600; display: inline-block; margin-bottom: 20px; }
        
        /* History Item Styling */
        .history-card { 
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px;
            display: flex; align-items: center; gap: 20px; margin-bottom: 15px;
        }
        .history-card img { width: 50px; height: 70px; object-fit: cover; border-radius: 5px; }
        .history-info h3 { margin: 0; font-size: 16px; color: #fff; }
        .history-info p { margin: 3px 0; font-size: 13px; color: #ccc; }
        .date-tag { background: #27ae60; padding: 2px 8px; border-radius: 5px; font-size: 11px; }
    </style>
</head>
<body>

    <div class="container">
        <a href="dashboard.html" class="back-btn">⬅ Back to Dashboard</a>
        <h1>📚 My Borrowing History</h1>
        <hr style="opacity: 0.2;">
        
        <div id="historyList">
            <!-- Data will load here -->
            <p>Loading your records...</p>
        </div>
    </div>

    <script>
        window.onload = async () => {
            const userId = localStorage.getItem('userId');
            if(!userId) { window.location.href="login.html"; return; }

            try {
                // Fetch history for the logged-in user
                const res = await fetch(`http://localhost:5000/api/books/history/${userId}`);
                const history = await res.json();
                
                const listDiv = document.getElementById('historyList');
                listDiv.innerHTML = '';

                if(history.length === 0) {
                    listDiv.innerHTML = "<p>You haven't borrowed any books yet.</p>";
                    return;
                }

                history.forEach(item => {
                    // Safety check if book was deleted from library but exists in history
                    const title = item.bookId ? item.bookId.title : "Unknown Book";
                    const img = item.bookId ? item.bookId.imageUrl : "https://via.placeholder.com/50x70";

                    listDiv.innerHTML += `
                        <div class="history-card">
                            <img src="${img}">
                            <div class="history-info">
                                <h3>${title}</h3>
                                <p>Borrowed on: <span class="date-tag">${new Date(item.borrowDate).toLocaleDateString()}</span></p>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                document.getElementById('historyList').innerHTML = "Error loading history.";
            }
        };
    </script>
</body>
</html>
