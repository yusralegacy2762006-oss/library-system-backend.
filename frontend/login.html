 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartLibrary | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Poppins', sans-serif; box-sizing: border-box; }
        body { 
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), 
                        url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-attachment: fixed; margin: 0;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.98); padding: 35px; border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center;
        }
        h2 { color: #2c3e50; margin: 0 0 10px 0; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 25px; outline: none; font-size: 14px; }
        .login-btn { width: 100%; padding: 12px; background: #2c3e50; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: 600; font-size: 16px; margin-top: 10px; }
        .login-btn:hover { background: #34495e; transform: scale(1.02); }
        .footer-text { margin-top: 20px; font-size: 13px; color: #333; }
        .footer-text a { color: #3498db; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>📚 Welcome Back</h2>
        <p>Login to your library account</p>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="login-btn">Login</button>
        </form>
        <div class="footer-text">Don't have an account? <a href="signup.html">Sign Up</a></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const response = await fetch('http://localhost:5000/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                // SAVE ALL DATA TO BROWSER
                localStorage.setItem('token', data.token);
                localStorage.setItem('userName', data.user.name);
                localStorage.setItem('userRole', data.user.role);
                localStorage.setItem('userId', data.user.id); // <--- CRUCIAL FOR HISTORY
                
                alert("Login Successful!");
                window.location.href = "dashboard.html";
            } else {
                alert("Error: " + data.message);
            }
        });
    </script>
</body>
</html>
